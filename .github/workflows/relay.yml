name: Relay Worker

on:
  push:
    paths:
      - 'requests/**'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Process relay requests
        run: |
          mkdir -p responses
          
          processed=0
          for file in requests/*.json; do
            [ -f "$file" ] || continue
            
            requestId=$(basename "$file" .json)
            echo "📥 Processing: $requestId"
            
            request=$(cat "$file")
            method=$(echo "$request" | jq -r '.method // "GET"')
            url=$(echo "$request" | jq -r '.url')
            body=$(echo "$request" | jq -r '.body // empty')
            headers=$(echo "$request" | jq -r '.headers // {} | to_entries | .[] | select(.key | test("^(host|connection|keep-alive|transfer-encoding)$") | not) | "-H \"\(.key): \(.value)\"")' 2>/dev/null || echo "")
            
            echo "   Method: $method"
            echo "   URL: $url"
            
            curlArgs=(-s -w "\n%{http_code}" --max-time 30 -X "$method" -L)
            
            echo "$request" | jq -r '.headers | to_entries[] | select(.key | test("^(host|connection|keep-alive|transfer-encoding)$") | not) | "-H \"\(.key): \(.value)\"")' 2>/dev/null | while read -r h; do
              [ -n "$h" ] && curlArgs+=($h)
            done
            
            if [ -n "$body" ] && [ "$body" != "null" ]; then
              curlArgs+=(-d "$body")
            fi
            
            response=$(curl "${curlArgs[@]}" "$url" 2>/dev/null || echo -e "\n502")
            
            statusCode=$(echo "$response" | tail -n1)
            responseBody=$(echo "$response" | sed '$d')
            
            echo "   Status: $statusCode"
            
            jq -n \
              --arg sc "$statusCode" \
              --arg body "$responseBody" \
              '{statusCode: ($sc | tonumber), headers: {"content-type": "application/octet-stream"}, body: $body}' > "responses/$requestId.json"
            
            rm "$file"
            processed=$((processed + 1))
            echo "   ✅ Done"
          done
          
          echo "\n📊 Processed $processed requests"

      - name: Commit responses
        run: |
          git config user.name "Relay Worker"
          git config user.email "relay@worker.local"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Relay: processed requests"
            git push
          fi

  cleanup:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Cleanup old files
        run: |
          find responses -name "*.json" -mmin +5 -delete 2>/dev/null || true
          find requests -name "*.json" -mmin +10 -delete 2>/dev/null || true
          
          git config user.name "Relay Worker"
          git config user.email "relay@worker.local"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Cleanup: removed old relay files"
            git push
          fi
